<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok Auth Callback</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 60px auto; padding: 0 24px; background: #0a0a0f; color: #e0e0e0; }
    h2 { color: #c8a84b; }
    code { background: #1a1a2e; padding: 12px 16px; display: block; border-radius: 6px; word-break: break-all; font-size: 0.9rem; margin-top: 8px; }
    p { color: #999; }
  </style>
</head>
<body>
  <h2>Authorization Code</h2>
  <p>Copy the code below and paste it into the terminal when prompted:</p>
  <code id="code">Loading...</code>
  <p id="status"></p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    if (code) {
      document.getElementById('code').textContent = code;
      document.getElementById('status').textContent = 'You can close this tab and return to the terminal.';
    } else if (error) {
      document.getElementById('code').textContent = 'Error: ' + error;
      document.getElementById('status').textContent = params.get('error_description') || '';
    } else {
      document.getElementById('code').textContent = 'No code found in URL.';
    }
  </script>
</body>
</html>
